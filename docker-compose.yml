services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      # THIS IS THE KEY LINE FOR HOT RELOAD:
      # It maps your local project folder into the container
      # So when you edit files locally, the container sees the changes
      - .:/app
      # This prevents the container's node_modules from being overwritten
      # by your local (possibly empty) node_modules folder
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/velozity?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - INTERNAL_API_KEY=internal-secret-key-change-in-production
      - SMTP_HOST=smtp.ethereal.email
      - SMTP_PORT=587
      - SMTP_USER=
      - SMTP_PASS=
      - RATE_LIMIT_GLOBAL=1000
      - RATE_LIMIT_BURST=50
      - RATE_LIMIT_BURST_WINDOW=5
      - API_KEY_ROTATION_GRACE_MINUTES=15
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: velozity
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
